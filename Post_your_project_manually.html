<!DOCTYPE html>
<html lang="en">

<head>
    <title>Primo Project Posting</title>
    <link href="images/logo.svg" rel="icon" type="icon/image">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>


    <header>
        <div class="header_code">
            <div class="header_flex">
                <div class="header_left">
                    <img src="images/logo.svg" alt="logo">
                </div>
                <div class="header_mid">
                    <div class="head_input_box">
                        <div class="header_input">
                            <div class="header_input_border">
                                <div class="search_icon">
                                    <img src="images/search1.svg" alt="search">
                                </div>
                                <div class="search_input">
                                    <input type="text" class="form-control" placeholder="Try searching by keywords">
                                </div>
                            </div>
                            <div class="frame_click">
                                <a href="javascript:void(0)" data-toggle="modal" data-target="#refined"><img
                                        src="images/frame.svg" alt="frame"></a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="header_right">
                    <ul>
                        <li>
                            <a href="javascript:void(0)" class="notification_bell"><img src="images/notification.svg"
                                    alt="notification"><span class="noti_count">4</span>
                            </a>
                        </li>
                        <li><a href="javascript:void(0)" class="hum_burger">

                            </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <div class="progressBar"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta/js/bootstrap.min.js"></script>
    <script src='https://cdn.ckeditor.com/ckeditor5/28.0.0/classic/ckeditor.js'></script>
    <script src="js/index.js"></script>
</body>

</html>
